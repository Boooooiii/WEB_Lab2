<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вхід та реєстрація</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="d-flex justify-content-center align-items-center vh-100">

    <header class="page-header">
        <h1>Calculator <span>v1.0</span></h1>
    </header>

    <a href="auth.html" class="nav-box" style="top: 20px; left: 20px;">☰</a>

    <a href="profile.html" class="nav-box" style="top: 80px; left: 20px;">웃</a>
    <a href="calculator.html" class="nav-box" style="top: 140px; left: 20px;">Σ</a>

    <a href="info.html" class="nav-box" style="bottom: 20px; left: 20px;">ⓘ</a>
    <div class="side-line"></div>

    <div class="calc-card p-4 bg-dark rounded shadow-lg" ">

        <ul class="nav nav-tabs mb-4" id="authTabs">
            <li class="nav-item">
                <button class="nav-link active" id="login-tab" data-bs-toggle="tab" data-bs-target="#login" type="button">Вхід</button>
            </li>
            <li class="nav-item">
                <button class="nav-link" id="register-tab" data-bs-toggle="tab" data-bs-target="#register" type="button">Реєстрація</button>
            </li>
        </ul>

        <div class="tab-content" id="authTabsContent">
            <div class="tab-pane fade show active" id="login" role="tabpanel">
                <form id="login-form">
                    <div class="form-group">
                        <label for="login-login">Логін</label>
                        <input type="text" class="form-control" id="login-login" placeholder="example@mail.com" required>
                    </div>
                    <div class="form-group">
                        <label for="login-password">Пароль</label>
                        <input type="password" class="form-control" id="login-password" placeholder="••••••••" required>
                    </div>
                    <div class="text-while" style="text-align: right; color: red; margin-top: 15px" id="login-error"></div>
                    <button type="submit" class="auth-btn">Увійти в систему</button>
                </form>
            </div>

            <div class="tab-pane fade" id="register" role="tabpanel">
                <form id ="register-form">
                    <div class="form-group">
                        <label for="reg-login">Логін</label>
                        <input type="text" class="form-control" id="reg-login" placeholder="Іван Іванов" required>
                    </div>
                    <div class="form-group">
                        <label for="reg-email">Електронна пошта</label>
                        <input type="email" class="form-control" id="reg-email" placeholder="example@mail.com" required>
                    </div>
                    <div class="form-group">
                        <label for="reg-password">Пароль</label>
                        <input type="password" class="form-control" id="reg-password" placeholder="••••••••" required>
                    </div>
                    <div class="text-while" style="text-align: right; color: red; margin-top: 15px" id="register-error"></div>
                    <button type="submit" class="auth-btn">Створити акаунт</button>
                </form>
            </div>
        </div>
    </div>

    <footer>
        Розроблено студентом <b>КВ-33</b> &copy; 2026
    </footer>

    <script src="JS/auth.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
